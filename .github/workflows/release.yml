name: release

# Build the no-runtime Go fallback installer (rcx) for every supported
# platform on tag push, checksum the artifacts, and attach them to the
# GitHub Release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v2.0.0)"
        required: false
        default: "v2.0.0"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.21"

      - name: Build rcx
        working-directory: installer/go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          out="rcx-${GOOS}-${GOARCH}"
          if [ "${GOOS}" = "windows" ]; then
            out="${out}.exe"
          fi
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/${out}" .
          ( cd dist && sha256sum "${out}" > "${out}.sha256" )

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rcx-${{ matrix.goos }}-${{ matrix.goarch }}
          path: installer/go/dist/*
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: List assets
        run: ls -la dist

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          # On tag pushes github.ref_name IS the tag; on manual (workflow_dispatch)
          # runs use the tag input (default v2.0.0) so the release step never
          # errors with "GitHub Releases requires a tag".
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: dist/*
          fail_on_unmatched_files: true
